<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hyver User Guide</title>
  <meta name="description" content="Hyver User Guide - Learn how to use Hyver AI agents, tools, and chat">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00b7a8">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.min.css">
  
  <style>
    :root {
      --hyver-primary: #00b7a8;
      --hyver-primary-hover: #00d4c4;
      --hyver-gradient: linear-gradient(135deg, #00b7a8 0%, #10b981 100%);
      
      --theme-color: #00b7a8;
      --base-background-color: #ffffff;
      --base-color: #334155;
      --heading-color: #0f172a;
      --text-color-base: #334155;
      --mono-hue: 170;
      --mono-saturation: 70%;
      
      --sidebar-background: #f8fafc;
      --sidebar-nav-link-color: #334155;
      --sidebar-nav-link-color--active: #00b7a8;
      --sidebar-nav-link-border-color--active: #00b7a8;
      --sidebar-name-color: #00b7a8;
      
      --link-color: #00b7a8;
      --link-color--hover: #00d4c4;
      
      --search-input-border-color: #e2e8f0;
      --search-input-border-color--focus: #00b7a8;
      
      --blockquote-border-color: #00b7a8;
      --blockquote-background: rgba(0, 183, 168, 0.08);
      
      --table-head-background: #00b7a8;
      --table-head-color: #ffffff;
    }
    
    html[data-theme='dark'] {
      --base-background-color: #0f0f0f;
      --base-color: #e2e8f0;
      --heading-color: #fafafa;
      --text-color-base: #cbd5e1;
      --sidebar-background: #1a1a1a;
      --sidebar-nav-link-color: #94a3b8;
      --code-theme-background: #1a1a1a;
      --code-theme-text: #e2e8f0;
      --code-inline-background: #2d2d2d;
      --code-inline-color: #e2e8f0;
      --table-row-odd-background: rgba(45, 45, 45, 0.5);
      --table-cell-border-color: #2d2d2d;
      --blockquote-background: rgba(0, 183, 168, 0.12);
    }
    
    .sidebar-nav > ul > li > a { font-weight: 600; }
    .app-name-link { display: flex; align-items: center; gap: 8px; font-weight: 700; }
    .app-name-link img { width: 28px; height: 28px; }
    .markdown-section h1:first-child { color: var(--theme-color); border-bottom: 2px solid var(--theme-color); padding-bottom: 0.5rem; }
    .markdown-section table th { background: var(--theme-color); color: white; }
    .progress { background: var(--theme-color) !important; height: 3px !important; }
    
    section.cover {
      background: linear-gradient(160deg, #0a0a0a 0%, #0f0f0f 30%, #0d2d2a 60%, #00b7a8 100%) !important;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }
    
    section.cover::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -30%;
      width: 80%;
      height: 150%;
      background: radial-gradient(ellipse, rgba(0, 183, 168, 0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    
    section.cover::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40%;
      background: linear-gradient(to top, rgba(0, 183, 168, 0.2) 0%, transparent 100%);
      pointer-events: none;
    }
    
    section.cover .cover-main {
      max-width: 900px;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }
    
    section.cover h1 {
      font-size: 4.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffffff 0%, #00d4c4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    section.cover h1 img {
      width: 90px;
      height: 90px;
      filter: drop-shadow(0 0 30px rgba(0, 183, 168, 0.6));
      margin-right: 20px;
    }
    
    section.cover blockquote {
      font-size: 1.6rem;
      font-weight: 300;
      color: rgba(255,255,255,0.85);
      border: none;
      background: transparent;
      margin: 0 0 2.5rem 0;
      letter-spacing: 0.02em;
    }
    
    section.cover blockquote p { margin: 0; }
    
    section.cover > p {
      font-size: 1.15rem;
      line-height: 1.9;
      color: rgba(255,255,255,0.75);
      max-width: 650px;
      margin: 0 auto 2.5rem;
    }
    
    section.cover ul {
      list-style: none;
      padding: 0;
      margin: 3rem auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.25rem;
      max-width: 750px;
    }
    
    section.cover ul li {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 183, 168, 0.25);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: left;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    section.cover ul li::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00b7a8, transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    section.cover ul li:hover {
      transform: translateY(-6px);
      background: rgba(0, 183, 168, 0.1);
      border-color: rgba(0, 183, 168, 0.5);
      box-shadow: 0 20px 40px -15px rgba(0, 183, 168, 0.3);
    }
    
    section.cover ul li:hover::before { opacity: 1; }
    
    section.cover ul li strong {
      color: #00d4c4;
      font-size: 1.15rem;
      font-weight: 600;
    }
    
    section.cover .btn {
      background: linear-gradient(135deg, #00b7a8 0%, #10b981 100%);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 1.1rem 3rem;
      font-size: 1.15rem;
      font-weight: 600;
      text-transform: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 30px -5px rgba(0, 183, 168, 0.5);
      position: relative;
      overflow: hidden;
    }
    
    section.cover .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    
    section.cover .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px -5px rgba(0, 183, 168, 0.6);
    }
    
    section.cover .btn:hover::before { left: 100%; }
    
    @media (max-width: 600px) {
      section.cover h1 { font-size: 2.8rem; }
      section.cover h1 img { width: 55px; height: 55px; }
      section.cover ul { grid-template-columns: 1fr; }
      section.cover blockquote { font-size: 1.3rem; }
    }
    
    .theme-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00b7a8 0%, #10b981 100%);
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 25px rgba(0, 183, 168, 0.45);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 1.4rem;
    }
    
    .theme-toggle:hover {
      transform: scale(1.12);
      box-shadow: 0 10px 35px rgba(0, 183, 168, 0.55);
    }
    
    .theme-toggle .icon-sun, .theme-toggle .icon-moon {
      position: absolute;
      transition: opacity 0.25s, transform 0.25s;
    }
    
    html[data-theme='light'] .theme-toggle .icon-sun { opacity: 1; transform: rotate(0); }
    html[data-theme='light'] .theme-toggle .icon-moon { opacity: 0; transform: rotate(-90deg); }
    html[data-theme='dark'] .theme-toggle .icon-sun { opacity: 0; transform: rotate(90deg); }
    html[data-theme='dark'] .theme-toggle .icon-moon { opacity: 1; transform: rotate(0); }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
    <span class="icon-sun">☀️</span>
    <span class="icon-moon">🌙</span>
  </button>
  
  <script>
    function getTheme() {
      return localStorage.getItem('docsify-theme') || 
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    }
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('docsify-theme', theme);
    }
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      setTheme(current === 'dark' ? 'light' : 'dark');
    }
    setTheme(getTheme());
    
    window.$docsify = {
      name: '<img src="assets/logo.svg" alt="Hyver">Hyver',
      loadSidebar: true,
      subMaxLevel: 3,
      coverpage: true,
      auto2top: true,
      search: { placeholder: 'Search docs...', noData: 'No results found', depth: 3 },
      copyCode: { buttonText: 'Copy', successText: 'Copied!' },
      pagination: { previousText: '← Previous', nextText: 'Next →' },
      progress: { position: 'top', color: '#00b7a8', height: '3px' },
      themeColor: '#00b7a8'
    }
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-progress@latest/dist/progress.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
</body>
</html>
