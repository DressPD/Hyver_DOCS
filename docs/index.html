<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hyver Docs</title>
  <meta name="description" content="Hyver User Guide — Chat with AI, manage your knowledge base, create skills, and track tasks">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00b7a8">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.min.css">
  
  <style>
    :root {
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-family-mono: 'JetBrains Mono', 'Fira Code', monospace;
      
      --hyver-primary: #00b7a8;
      --hyver-primary-dark: #009e91;
      --hyver-primary-light: #00d4c4;
      --hyver-glow: rgba(0, 183, 168, 0.18);
      
      --theme-color: #00b7a8;
      --base-background-color: #ffffff;
      --base-color: #374151;
      --heading-color: #111827;
      --text-color-base: #374151;
      --mono-hue: 170;
      --mono-saturation: 70%;
      
      --sidebar-background: #f9fafb;
      --sidebar-border-color: #f0f0f0;
      --sidebar-nav-link-color: #4b5563;
      --sidebar-nav-link-color--active: #00b7a8;
      --sidebar-nav-link-border-color--active: #00b7a8;
      --sidebar-nav-link-font-weight--active: 600;
      --sidebar-name-color: #111827;
      
      --link-color: #00b7a8;
      --link-color--hover: #009e91;
      --link-text-decoration: none;
      
      --search-input-border-color: #e5e7eb;
      --search-input-border-color--focus: #00b7a8;
      --search-input-background-color: #f9fafb;
      
      --blockquote-border-color: #00b7a8;
      --blockquote-background: rgba(0, 183, 168, 0.07);
      
      --table-head-background: #111827;
      --table-head-color: #ffffff;
      --table-row-odd-background: #f9fafb;
      --table-cell-border-color: #e5e7eb;
      
      --code-inline-background: rgba(0, 183, 168, 0.08);
      --code-inline-color: #00917d;
      --code-font-size: 0.87em;
      
      --base-font-size: 15.5px;
      --base-line-height: 1.75;
      --content-max-width: 860px;
    }
    
    html[data-theme='dark'] {
      --base-background-color: #0d0d0f;
      --base-color: #d1d5db;
      --heading-color: #f9fafb;
      --text-color-base: #d1d5db;
      --sidebar-background: #111113;
      --sidebar-border-color: #1f1f23;
      --sidebar-nav-link-color: #9ca3af;
      --sidebar-name-color: #f9fafb;
      --search-input-background-color: #1a1a1e;
      --search-input-border-color: #2a2a30;
      --code-theme-background: #161618;
      --code-theme-text: #e5e7eb;
      --code-inline-background: rgba(0, 183, 168, 0.1);
      --code-inline-color: #34d399;
      --table-head-background: #1f1f23;
      --table-row-odd-background: rgba(255,255,255,0.03);
      --table-cell-border-color: #2a2a30;
      --blockquote-background: rgba(0, 183, 168, 0.1);
    }
    
    /* ── Fonts ── */
    body, .sidebar-nav, .sidebar, input { font-family: var(--font-family) !important; }
    code, pre, pre code { font-family: var(--font-family-mono) !important; }
    
    /* ── Sidebar ── */
    .sidebar { border-right: 1px solid var(--sidebar-border-color) !important; }
    .sidebar-nav > ul > li > a {
      font-size: 0.73rem !important;
      font-weight: 700 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.08em !important;
      color: #9ca3af !important;
      pointer-events: none;
    }
    .sidebar-nav li a { border-radius: 7px; padding: 5px 12px !important; font-size: 0.875rem !important; transition: background 0.12s, color 0.12s; }
    .sidebar-nav li a:hover { background: rgba(0, 183, 168, 0.08) !important; color: var(--hyver-primary) !important; text-decoration: none !important; }
    .sidebar-nav li.active > a { background: rgba(0, 183, 168, 0.1) !important; font-weight: 600 !important; }
    .app-name-link { display: flex; align-items: center; gap: 10px; font-weight: 700 !important; letter-spacing: -0.02em; }
    .app-name-link img { width: 26px; height: 26px; }
    
    /* ── Content ── */
    .markdown-section { max-width: var(--content-max-width) !important; padding: 2rem 3rem !important; font-size: var(--base-font-size) !important; line-height: var(--base-line-height) !important; }
    @media (max-width: 768px) { .markdown-section { padding: 1.25rem 1.25rem !important; } }
    .markdown-section h1 { font-size: 2rem !important; font-weight: 800 !important; letter-spacing: -0.03em !important; border-bottom: 1px solid #e5e7eb !important; padding-bottom: 0.75rem !important; margin-bottom: 1.5rem !important; color: var(--heading-color) !important; }
    html[data-theme='dark'] .markdown-section h1 { border-bottom-color: #1f1f23 !important; }
    .markdown-section h2 { font-size: 1.35rem !important; font-weight: 700 !important; letter-spacing: -0.02em !important; margin-top: 2.5rem !important; color: var(--heading-color) !important; }
    .markdown-section h3 { font-size: 1.05rem !important; font-weight: 600 !important; margin-top: 1.75rem !important; color: var(--heading-color) !important; }
    .markdown-section a { font-weight: 500; text-underline-offset: 3px; }
    .markdown-section ul li::marker, .markdown-section ol li::marker { color: var(--hyver-primary); }
    
    /* ── Tables ── */
    .markdown-section table { border-radius: 10px !important; overflow: hidden !important; border: 1px solid var(--table-cell-border-color) !important; border-collapse: separate !important; border-spacing: 0 !important; font-size: 0.9rem !important; margin: 1.25rem 0 !important; }
    .markdown-section table th { font-weight: 600 !important; font-size: 0.78rem !important; text-transform: uppercase !important; letter-spacing: 0.05em !important; padding: 0.75rem 1rem !important; }
    .markdown-section table td { padding: 0.7rem 1rem !important; }
    
    /* ── Code ── */
    .markdown-section pre { border-radius: 10px !important; border: 1px solid #e5e7eb !important; margin: 1.25rem 0 !important; }
    html[data-theme='dark'] .markdown-section pre { border-color: #2a2a30 !important; }
    .markdown-section pre > code { font-size: 0.85em !important; line-height: 1.65 !important; }
    .markdown-section code { border-radius: 4px !important; padding: 0.15em 0.45em !important; font-size: 0.875em !important; }
    
    /* ── Blockquote ── */
    .markdown-section blockquote { border-radius: 10px; border-left: 3px solid var(--hyver-primary) !important; padding: 1rem 1.25rem !important; margin: 1.5rem 0 !important; }
    
    /* ── Pagination ── */
    .pagination-item a { border-radius: 10px !important; border: 1px solid var(--table-cell-border-color) !important; padding: 0.75rem 1.25rem !important; font-size: 0.875rem !important; font-weight: 500 !important; transition: all 0.15s !important; background: var(--base-background-color) !important; }
    .pagination-item a:hover { border-color: var(--hyver-primary) !important; color: var(--hyver-primary) !important; text-decoration: none !important; }
    
    /* ── Progress bar ── */
    .progress { background: var(--theme-color) !important; height: 2px !important; }
    
    /* ── Page fade-in ── */
    .content { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    
    section.cover {
      background: linear-gradient(160deg, #0a0a0a 0%, #0f0f0f 30%, #0d2d2a 60%, #00b7a8 100%) !important;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }
    
    section.cover::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -30%;
      width: 80%;
      height: 150%;
      background: radial-gradient(ellipse, rgba(0, 183, 168, 0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    
    section.cover::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40%;
      background: linear-gradient(to top, rgba(0, 183, 168, 0.2) 0%, transparent 100%);
      pointer-events: none;
    }
    
    section.cover .cover-main {
      max-width: 900px;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }
    
    section.cover h1 {
      font-size: 4.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffffff 0%, #00d4c4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    section.cover h1 img {
      width: 90px;
      height: 90px;
      filter: drop-shadow(0 0 30px rgba(0, 183, 168, 0.6));
      margin-right: 20px;
    }
    
    section.cover blockquote {
      font-size: 1.6rem;
      font-weight: 300;
      color: rgba(255,255,255,0.85);
      border: none;
      background: transparent;
      margin: 0 0 2.5rem 0;
      letter-spacing: 0.02em;
    }
    
    section.cover blockquote p { margin: 0; }
    
    section.cover > p {
      font-size: 1.15rem;
      line-height: 1.9;
      color: rgba(255,255,255,0.75);
      max-width: 650px;
      margin: 0 auto 2.5rem;
    }
    
    section.cover ul {
      list-style: none;
      padding: 0;
      margin: 3rem auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.25rem;
      max-width: 750px;
    }
    
    section.cover ul li {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 183, 168, 0.25);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: left;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    section.cover ul li::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00b7a8, transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    section.cover ul li:hover {
      transform: translateY(-6px);
      background: rgba(0, 183, 168, 0.1);
      border-color: rgba(0, 183, 168, 0.5);
      box-shadow: 0 20px 40px -15px rgba(0, 183, 168, 0.3);
    }
    
    section.cover ul li:hover::before { opacity: 1; }
    
    section.cover ul li strong {
      color: #00d4c4;
      font-size: 1.15rem;
      font-weight: 600;
    }
    
    section.cover .btn {
      background: linear-gradient(135deg, #00b7a8 0%, #00d4c4 100%);
      color: #0a0a10;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      padding: 0.95rem 2.75rem;
      font-size: 1rem;
      letter-spacing: -0.01em;
      text-transform: none;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 24px -4px rgba(0, 183, 168, 0.45);
      display: inline-block;
      text-decoration: none;
    }
    
    section.cover .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px -4px rgba(0, 183, 168, 0.55);
    }
    
    @media (max-width: 600px) {
      section.cover h1 { font-size: 2.8rem; }
      section.cover h1 img { width: 55px; height: 55px; }
      section.cover ul { grid-template-columns: 1fr; }
      section.cover blockquote { font-size: 1.3rem; }
    }
    
    .theme-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--hyver-primary);
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0, 183, 168, 0.4);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 1.15rem;
    }
    
    .theme-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 28px rgba(0, 183, 168, 0.5);
    }
    
    .theme-toggle .icon-sun, .theme-toggle .icon-moon {
      position: absolute;
      transition: opacity 0.25s, transform 0.25s;
    }
    
    html[data-theme='light'] .theme-toggle .icon-sun { opacity: 1; transform: rotate(0); }
    html[data-theme='light'] .theme-toggle .icon-moon { opacity: 0; transform: rotate(-90deg); }
    html[data-theme='dark'] .theme-toggle .icon-sun { opacity: 0; transform: rotate(90deg); }
    html[data-theme='dark'] .theme-toggle .icon-moon { opacity: 1; transform: rotate(0); }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
    <span class="icon-sun">☀️</span>
    <span class="icon-moon">🌙</span>
  </button>
  
  <script>
    function getTheme() {
      return localStorage.getItem('docsify-theme') || 
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    }
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('docsify-theme', theme);
    }
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      setTheme(current === 'dark' ? 'light' : 'dark');
    }
    setTheme(getTheme());
    
    window.$docsify = {
      name: '<img src="assets/logo.svg" alt="Hyver">Hyver',
      loadSidebar: true,
      subMaxLevel: 3,
      coverpage: true,
      auto2top: true,
      search: { placeholder: 'Search docs...', noData: 'No results found', depth: 3 },
      copyCode: { buttonText: 'Copy', successText: 'Copied!' },
      pagination: { previousText: '← Previous', nextText: 'Next →' },
      progress: { position: 'top', color: '#00b7a8', height: '3px' },
      themeColor: '#00b7a8'
    }
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-progress@latest/dist/progress.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
</body>
</html>
