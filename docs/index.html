<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hyver User Guide</title>
  <meta name="description" content="Hyver User Guide - Learn how to use Hyver AI agents, tools, and chat">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#14b8a6">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.min.css">
  
  <style>
    :root {
      --theme-color: #14b8a6;
      --base-background-color: #ffffff;
      --base-color: #334155;
      --heading-color: #0f172a;
      --text-color-base: #334155;
      --mono-hue: 170;
      --mono-saturation: 84%;
      
      --sidebar-background: #f8fafc;
      --sidebar-nav-link-color: #334155;
      --sidebar-nav-link-color--active: #14b8a6;
      --sidebar-nav-link-border-color--active: #14b8a6;
      --sidebar-name-color: #14b8a6;
      
      --link-color: #14b8a6;
      --link-color--hover: #0d9488;
      
      --search-input-border-color: #e2e8f0;
      --search-input-border-color--focus: #14b8a6;
      
      --blockquote-border-color: #14b8a6;
      --blockquote-background: rgba(20, 184, 166, 0.08);
      
      --table-head-background: #14b8a6;
      --table-head-color: #ffffff;
      
      --notice-tip-border-color: #14b8a6;
    }
    
    html[data-theme='dark'] {
      --base-background-color: #0f172a;
      --base-color: #cbd5e1;
      --heading-color: #f1f5f9;
      --text-color-base: #cbd5e1;
      --sidebar-background: #1e293b;
      --sidebar-nav-link-color: #94a3b8;
      --code-theme-background: #1e293b;
      --code-theme-text: #e2e8f0;
      --code-inline-background: #334155;
      --code-inline-color: #e2e8f0;
      --table-row-odd-background: rgba(30, 41, 59, 0.5);
      --table-cell-border-color: #334155;
      --blockquote-background: rgba(20, 184, 166, 0.15);
    }
    
    .sidebar-nav > ul > li > a {
      font-weight: 600;
    }
    
    .app-name-link {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }
    
    .app-name-link img {
      width: 28px;
      height: 28px;
    }
    
    .markdown-section h1:first-child {
      color: var(--theme-color);
      border-bottom: 2px solid var(--theme-color);
      padding-bottom: 0.5rem;
    }
    
    .markdown-section table th {
      background: var(--theme-color);
      color: white;
    }
    
    .progress {
      background: var(--theme-color) !important;
      height: 3px !important;
    }
    
    /* ===== COVER PAGE STYLES ===== */
    section.cover {
      background: linear-gradient(135deg, #0f172a 0%, #134e4a 40%, #14b8a6 100%) !important;
      min-height: 100vh;
    }
    
    section.cover .cover-main {
      max-width: 800px;
      padding: 0 24px;
    }
    
    section.cover h1 {
      font-size: 4rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    
    section.cover h1 img {
      width: 80px;
      height: 80px;
      filter: brightness(0) invert(1);
      margin-right: 16px;
    }
    
    section.cover blockquote {
      font-size: 1.5rem;
      font-weight: 300;
      color: rgba(255,255,255,0.9);
      border: none;
      background: transparent;
      margin: 0 0 2rem 0;
    }
    
    section.cover blockquote p {
      margin: 0;
    }
    
    section.cover > p {
      font-size: 1.1rem;
      line-height: 1.8;
      color: rgba(255,255,255,0.85);
      max-width: 600px;
      margin: 0 auto 2rem;
    }
    
    section.cover ul {
      list-style: none;
      padding: 0;
      margin: 2.5rem 0;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }
    
    section.cover ul li {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 1.25rem;
      text-align: left;
      transition: transform 0.2s, background 0.2s;
    }
    
    section.cover ul li:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.15);
    }
    
    section.cover ul li strong {
      color: #5eead4;
      font-size: 1.1rem;
    }
    
    section.cover .btn {
      background: #14b8a6;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 1rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      text-transform: none;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(20, 184, 166, 0.4);
    }
    
    section.cover .btn:hover {
      background: #0d9488;
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(20, 184, 166, 0.5);
    }
    
    @media (max-width: 600px) {
      section.cover h1 {
        font-size: 2.5rem;
      }
      section.cover h1 img {
        width: 50px;
        height: 50px;
      }
      section.cover ul {
        grid-template-columns: 1fr;
      }
    }
    
    /* ===== DARK MODE TOGGLE ===== */
    .theme-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--theme-color);
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(20, 184, 166, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      font-size: 1.3rem;
    }
    
    .theme-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(20, 184, 166, 0.5);
    }
    
    .theme-toggle .icon-sun,
    .theme-toggle .icon-moon {
      position: absolute;
      transition: opacity 0.2s, transform 0.2s;
    }
    
    html[data-theme='light'] .theme-toggle .icon-sun { opacity: 1; transform: rotate(0); }
    html[data-theme='light'] .theme-toggle .icon-moon { opacity: 0; transform: rotate(-90deg); }
    html[data-theme='dark'] .theme-toggle .icon-sun { opacity: 0; transform: rotate(90deg); }
    html[data-theme='dark'] .theme-toggle .icon-moon { opacity: 1; transform: rotate(0); }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
    <span class="icon-sun">☀️</span>
    <span class="icon-moon">🌙</span>
  </button>
  
  <script>
    function getTheme() {
      return localStorage.getItem('docsify-theme') || 
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    }
    
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('docsify-theme', theme);
    }
    
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      setTheme(current === 'dark' ? 'light' : 'dark');
    }
    
    setTheme(getTheme());
    
    window.$docsify = {
      name: '<img src="assets/logo.svg" alt="Hyver">Hyver',
      loadSidebar: true,
      subMaxLevel: 3,
      coverpage: true,
      auto2top: true,
      
      search: {
        placeholder: 'Search docs...',
        noData: 'No results found',
        depth: 3
      },
      
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied!'
      },
      
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →'
      },
      
      progress: {
        position: 'top',
        color: '#14b8a6',
        height: '3px'
      },
      
      themeColor: '#14b8a6'
    }
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-progress@latest/dist/progress.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
</body>
</html>
